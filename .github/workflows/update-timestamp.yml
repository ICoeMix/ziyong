name: update-timestamp

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-timestamps:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Update timestamps
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          TZ: Asia/Shanghai
        run: |
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            mapfile -d '' files < <(git ls-files -z '*.js')
          else
            mapfile -d '' files < <(git diff --name-only -z "$BEFORE_SHA" "$CURRENT_SHA" -- '*.js')
          fi

          if [ ${#files[@]} -gt 0 ]; then
            python .github/update_timestamp.py "${files[@]}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- "${files[@]}"
            git diff --cached --quiet || (
              git commit -m "🕒 Auto update timestamps [skip ci]"
              git pull origin main --rebase
              git push origin main
            )
          else
            echo "No .js files changed."
          fi
